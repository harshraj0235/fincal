# MoneyCal.in Netlify Configuration
# Optimized for SEO and Performance
# Last Updated: 2025-01-20

# === REDIRECTS ===
# Soft 404 fix: duplicate path /moneycal.in/* -> /* (301)
[[redirects]]
  from = "/moneycal.in/*"
  to = "/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/moneycal.in"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/hi/*"
  to = "/404"
  status = 410
  force = true

[[redirects]]
  from = "/ExcelTool"
  to = "/exceltool"
  status = 301
  force = true

[[redirects]]
  from = "/ExcelTool/*"
  to = "/exceltool/:splat"
  status = 301
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# === HEADERS ===
# Deprecated Hindi pages - noindex
[[headers]]
  for = "/hi/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-cache, no-store, must-revalidate"

# Global headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    X-Robots-Tag = "index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"

# Calculator pages - optimized for indexing
[[headers]]
  for = "/calculators/*"
  [headers.values]
    X-Robots-Tag = "index, follow, max-image-preview:large"
    Cache-Control = "public, max-age=3600, must-revalidate"

# Blog pages - optimized for indexing
[[headers]]
  for = "/blog/*"
  [headers.values]
    X-Robots-Tag = "index, follow, max-image-preview:large"
    Cache-Control = "public, max-age=3600, must-revalidate"

# Learn pages - optimized for indexing
[[headers]]
  for = "/learn/*"
  [headers.values]
    X-Robots-Tag = "index, follow, max-image-preview:large"
    Cache-Control = "public, max-age=3600, must-revalidate"

# Government schemes - optimized for indexing
[[headers]]
  for = "/government-schemes/*"
  [headers.values]
    X-Robots-Tag = "index, follow, max-image-preview:large"
    Cache-Control = "public, max-age=3600, must-revalidate"

# News pages - optimized for Google News
[[headers]]
  for = "/news/*"
  [headers.values]
    X-Robots-Tag = "index, follow, max-image-preview:large"
    Cache-Control = "public, max-age=1800, must-revalidate"

# Sitemaps - noindex but cacheable
[[headers]]
  for = "/sitemap*.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
    Content-Type = "application/xml; charset=utf-8"
    X-Robots-Tag = "noindex"

# Robots.txt - cacheable
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "text/plain; charset=utf-8"

# Static assets - long cache
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# JavaScript files
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CSS files
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Font files
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.ttf"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Image files
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.gif"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML files - no cache for fresh content
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# === BUILD CONFIGURATION ===
[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "18"
