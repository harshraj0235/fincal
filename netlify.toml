# MoneyCal.in Netlify Configuration
# Optimized for SEO and Performance
# Last Updated: 2025-01-20

# === REDIRECTS ===
# CRITICAL: www → non-www (must be first - Google indexes www and non-www separately)
# Prevents 404 on www.moneycal.in URL Inspection in Google Search Console
# NOTE: Add www.moneycal.in as domain alias in Netlify Dashboard → Domain management
[[redirects]]
  from = "https://www.moneycal.in/"
  to = "https://moneycal.in/"
  status = 301
  force = true

[[redirects]]
  from = "http://www.moneycal.in/"
  to = "https://moneycal.in/"
  status = 301
  force = true

[[redirects]]
  from = "https://www.moneycal.in/*"
  to = "https://moneycal.in/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.moneycal.in/*"
  to = "https://moneycal.in/:splat"
  status = 301
  force = true

# Fix double-domain Soft 404s reported in Google Search Console.
# These occur when Google crawled URLs with the domain appearing twice in the path,
# e.g. moneycal.in/moneycal.in/learn/... -> moneycal.in/learn/...
[[redirects]]
  from = "/moneycal.in/*"
  to = "/:splat"
  status = 301
  force = true

# Specific Slug Mismatches
[[redirects]]
  from = "/blog/indogulf-cropsciences-ipo"
  to = "/blog/indogulf-cropsciences-ipo-agricultural-sector-guide"
