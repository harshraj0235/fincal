# === BUILD CONFIGURATION ===
[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "18"

# === PRERENDERING FOR SEO ===
# Serves fully-rendered HTML to search engine bots (Googlebot, Bingbot, etc.)
# instead of the empty SPA shell. This ensures ALL content is visible on first crawl.
[[plugins]]
  package = "@netlify/plugin-prerender"

  [plugins.inputs]
    # Bot user agents that should receive prerendered pages
    bot_user_agents = [
      "googlebot",
      "bingbot",
      "linkedinbot",
      "whatsapp",
      "twitterbot",
      "facebookexternalhit",
      "rogerbot",
      "embedly",
      "quora link preview",
      "showyoubot",
      "outbrain",
      "pinterest/0.",
      "developers.google.com/+/web/snippet",
      "slackbot",
      "vkShare",
      "W3C_Validator",
      "redditbot",
      "applebot",
      "yandex",
      "baiduspider",
      "duckduckbot",
      "telegrambot"
    ]
