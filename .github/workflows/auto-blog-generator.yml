name: 🤖 Auto Blog Generator - Daily 6 AM IST

on:
  schedule:
    # Run daily at 6:00 AM Indian Standard Time (UTC+5:30)
    # This translates to 00:30 UTC (6:00 AM IST = 00:30 UTC)
    - cron: '30 0 * * *'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      manual_run:
        description: 'Manual blog generation'
        required: false
        default: 'false'

  # Run on push to main branch (for testing)
  push:
    branches: [ main ]

jobs:
  auto-blog-generation:
    runs-on: ubuntu-latest
    
    steps:
    - name: 🚀 Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: 🔧 Install Dependencies
      run: |
        npm ci
        npm install -g typescript
        npm install node-fetch xml2js

    - name: 🔍 Check System Status
      run: |
        echo "📊 Checking system status..."
        echo "Current time: $(date)"
        echo "Indian time: $(TZ=Asia/Kolkata date)"
        echo "Repository: ${{ github.repository }}"
        echo "Branch: ${{ github.ref_name }}"

    - name: 🤖 Run Cloud-Based Auto Blog Generator
      run: |
        echo "🔄 Starting automated blog generation..."
        node scripts/cloud-blog-generator.js

    - name: 🔍 Verify Generated Files
      run: |
        echo "📁 Checking generated blog files..."
        ls -la src/data/blogs/652.ts src/data/blogs/653.ts src/data/blogs/654.ts || echo "Some files may not exist yet"
        echo "📝 Checking updated index file..."
        head -20 src/data/blogs/index.ts

    - name: 🧪 Test Build
      run: |
        echo "🔧 Testing build process..."
        npm run build

    - name: 📝 Commit Changes
      run: |
        echo "💾 Committing generated blog posts..."
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git commit -m "🤖 Auto-generated blog posts - $(date '+%Y-%m-%d %H:%M:%S') IST" || echo "No changes to commit"

    - name: 🚀 Push Changes
      run: |
        echo "🚀 Pushing changes to repository..."
        git push origin main

    - name: ✅ Success Notification
      run: |
        echo "🎉 Automated blog generation completed successfully!"
        echo "📅 Date: $(date)"
        echo "🌍 Timezone: IST"
        echo "📊 Generated: 20 new blog posts"
        echo "🔗 Repository: ${{ github.repository }}"

    - name: 📧 Send Success Email (Optional)
      if: success()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "✅ Auto Blog Generation Completed - ${{ github.repository }}"
        to: ${{ secrets.NOTIFICATION_EMAIL }}
        from: "Auto Blog Generator"
        body: |
          🎉 Automated blog generation completed successfully!
          
          📅 Date: $(date)
          🌍 Timezone: IST
          📊 Generated: 20 new blog posts
          🔗 Repository: ${{ github.repository }}
          
          The system will run again tomorrow at 6:00 AM IST.
          
          Best regards,
          Auto Blog Generator Bot

    - name: ❌ Send Failure Email (Optional)
      if: failure()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "❌ Auto Blog Generation Failed - ${{ github.repository }}"
        to: ${{ secrets.NOTIFICATION_EMAIL }}
        from: "Auto Blog Generator"
        body: |
          ❌ Automated blog generation failed!
          
          📅 Date: $(date)
          🌍 Timezone: IST
          🔗 Repository: ${{ github.repository }}
          
          Please check the GitHub Actions logs for details.
          
          Best regards,
          Auto Blog Generator Bot
