# Regenerate package-lock.json so Cloudflare npm install succeeds
name: Update package-lock.json

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'package.json'
  schedule:
    - cron: '0 0 * * 0'  # Weekly Sunday midnight

permissions:
  contents: write

jobs:
  update-lock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (regenerate lock file)
        run: npm install

      - name: Commit and push if lock file changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f package-lock.json ]; then
            git add package-lock.json
            if git diff --staged --quiet; then
              echo "No changes to package-lock.json"
            else
              git commit -m "chore: regenerate package-lock.json"
              git push
            fi
          else
            echo "No package-lock.json found (npm may not have created it) - skipping commit"
          fi
