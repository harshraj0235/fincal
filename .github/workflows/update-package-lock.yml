# Regenerate package-lock.json so Cloudflare npm ci succeeds
name: Update package-lock.json

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-lock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (regenerate lock file)
        run: npm install --legacy-peer-deps

      - name: Commit and push if lock file changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          if git diff --staged --quiet; then
            echo "No changes to package-lock.json"
          else
            git commit -m "chore: regenerate package-lock.json for Cloudflare npm ci"
            git push
          fi
