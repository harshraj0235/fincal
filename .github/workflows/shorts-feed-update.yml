# MoneyCal News Shorts — MUST run every 10 min. India-focused feed, 360+ char summary, image per item, auto-commit.
# https://moneycal.in/news/shorts depends on this for fresh Latest + category tabs and image + paragraph on every card.

name: Shorts Feed Update

on:
  schedule:
    - cron: '*/10 * * * *'   # Every 10 minutes — do not change
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-shorts-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Fetch shorts feed (India RSS + scrape → shorts-feed.json)
        run: node scripts/fetch-shorts-feed.cjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/shorts-feed.json
          if git diff --staged --quiet; then
            echo "No changes to push"
          else
            git commit -m "chore: update shorts feed (India news, 360+ summary, auto 10min)"
            git push origin HEAD:main
          fi
