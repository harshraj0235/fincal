# Update trending Indian news RSS feed every 2 hours and push to repo

name: Trending RSS Update

on:
  schedule:
    # Every 2 hours (at 0:00 and 2:00 UTC; adjust as needed for IST)
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  update-rss:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Fetch trending RSS and write JSON
        run: node scripts/fetch-trending-rss.cjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/trending-rss-feed.json
          if git diff --staged --quiet; then
            echo "No changes to push"
          else
            git commit -m "chore: update trending RSS feed (auto)"
            git push
          fi
