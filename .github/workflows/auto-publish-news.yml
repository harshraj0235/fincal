# 🤖 Automated News Publisher - Runs Daily at 2 AM IST

name: Auto-Publish News Articles

on:
  schedule:
    # Runs at 2:00 AM IST daily (20:30 UTC previous day)
    - cron: '30 20 * * *'
  
  # Manual trigger (for testing)
  workflow_dispatch:

jobs:
  publish-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📥 Install Dependencies
        run: npm ci

      - name: 🔧 Setup Environment Variables
        run: |
          echo "GNEWS_API_KEY=${{ secrets.GNEWS_API_KEY }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "UNSPLASH_ACCESS_KEY=${{ secrets.UNSPLASH_ACCESS_KEY }}" >> .env
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> .env

      - name: 🤖 Run Auto News Publisher
        run: node scripts/auto-news-publisher/main.js

      - name: 🏗️ Build Project (Verify No Errors)
        run: npm run build
        continue-on-error: true

      - name: 📊 Generate Report
        if: always()
        run: |
          echo "## 🤖 Auto News Publisher Report" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date +'%Y-%m-%d %H:%M:%S IST')" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          if [ -f logs/auto-publisher.log ]; then
            echo "### Last Log Entry:" >> $GITHUB_STEP_SUMMARY
            tail -20 logs/auto-publisher.log >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📧 Notify on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Auto News Publisher Failed - ' + new Date().toLocaleDateString('en-IN'),
              body: 'The automated news publisher failed. Check workflow logs for details.',
              labels: ['automated', 'news-publisher', 'bug']
            });

