# Build Next.js app (full content) and deploy to Cloudflare Pages
# Uses next-app/ which has all calculators, learn, blog, news, tools
name: Build and Deploy to Cloudflare

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (next-app)
        working-directory: next-app
        run: npm install --legacy-peer-deps

      - name: Generate sitemaps
        working-directory: next-app
        run: npm run generate-sitemaps

      - name: Generate static params
        working-directory: next-app
        run: node scripts/generate-static-params.cjs

      - name: Build Next.js (static export)
        working-directory: next-app
        run: npm run build:next
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Deploy to Cloudflare Pages
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        run: npx wrangler pages deploy next-app/out --project-name=moneycal
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Skip deploy (no API token)
        if: ${{ secrets.CLOUDFLARE_API_TOKEN == '' }}
        run: echo "CLOUDFLARE_API_TOKEN not set - deploy skipped."