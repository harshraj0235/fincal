# Build SvelteKit (root) and deploy to Cloudflare Pages
name: Build and Deploy to Cloudflare

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build (SvelteKit for Cloudflare)
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        run: npx wrangler pages deploy .svelte-kit/cloudflare --project-name=moneycal
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Skip deploy (no API token)
        if: ${{ secrets.CLOUDFLARE_API_TOKEN == '' }}
        run: echo "CLOUDFLARE_API_TOKEN not set in repo Secrets - deploy skipped. Add it in Settings → Secrets and variables → Actions."
