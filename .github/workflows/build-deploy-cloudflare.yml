# Build on GitHub (7GB RAM) and deploy to Cloudflare - avoids Cloudflare's 4GB OOM
name: Build and Deploy to Cloudflare

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate sitemaps
        run: npm run generate-sitemaps

      - name: Generate static params
        run: node scripts/generate-static-params.cjs

      - name: Build (static export for Cloudflare Pages)
        run: npx next build
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy out --project-name=moneycal
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
