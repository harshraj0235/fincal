<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astro-Finance Insights Hub | MoneyCalc India</title>
  <meta name="description" content="Explore the intersection of astrology and finance with our comprehensive Astro-Finance tools. Discover financial horoscopes, numerology insights, and auspicious timing for financial decisions.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#2563eb">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8f9ff;
      color: #1e293b;
    }
    
    .cosmic-bg {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #4c1d95 100%);
    }
    
    .cosmic-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
    }
    
    .cosmic-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .tool-card {
      transition: all 0.3s ease;
      border: 1px solid #e2e8f0;
    }
    
    .tool-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      border-color: #a855f7;
    }
    
    .zodiac-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
    }
    
    @media (max-width: 768px) {
      .zodiac-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
    
    @media (max-width: 640px) {
      .zodiac-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    
    .zodiac-item {
      aspect-ratio: 1/1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 0.75rem;
      transition: all 0.3s ease;
      background: white;
      cursor: pointer;
    }
    
    .zodiac-item:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }
    
    .star-bg {
      position: relative;
      overflow: hidden;
    }
    
    .star-bg::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        radial-gradient(circle at 25% 25%, rgba(255, 255, 255, 0.2) 1px, transparent 1px),
        radial-gradient(circle at 75% 75%, rgba(255, 255, 255, 0.2) 1px, transparent 1px),
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.2) 1px, transparent 1px);
      background-size: 100px 100px;
      opacity: 0.3;
      z-index: 0;
    }
    
    .glow-text {
      text-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
    }
    
    .number-card {
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    
    .number-card::before {
      content: attr(data-number);
      position: absolute;
      top: -20px;
      right: -20px;
      font-size: 120px;
      font-weight: 800;
      opacity: 0.05;
      z-index: 0;
    }
    
    .number-card:hover {
      transform: translateY(-5px);
    }
    
    .scroll-smooth {
      scroll-behavior: smooth;
    }
    
    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #94a3b8;
      border-radius: 4px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }
    
    /* Animations */
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
    
    .float {
      animation: float 6s ease-in-out infinite;
    }
    
    .float-delay-1 {
      animation-delay: 1s;
    }
    
    .float-delay-2 {
      animation-delay: 2s;
    }
    
    .float-delay-3 {
      animation-delay: 3s;
    }
    
    /* Astro symbols */
    .astro-symbol {
      font-size: 2rem;
      line-height: 1;
    }
    
    /* Muhurat table styles */
    .muhurat-table th, .muhurat-table td {
      padding: 0.75rem 1rem;
      text-align: left;
    }
    
    .muhurat-table th {
      background-color: #f8f4ff;
      font-weight: 600;
    }
    
    .muhurat-table tr:nth-child(even) {
      background-color: #faf5ff;
    }
    
    /* Nakshatra styles */
    .nakshatra-list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }
    
    @media (max-width: 768px) {
      .nakshatra-list {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    
    @media (max-width: 640px) {
      .nakshatra-list {
        grid-template-columns: 1fr;
      }
    }
    
    /* Gemstone styles */
    .gemstone-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1rem;
    }
    
    .gemstone-item {
      aspect-ratio: 1/1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 0.75rem;
      transition: all 0.3s ease;
      background: white;
      cursor: pointer;
    }
    
    .gemstone-item:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }
    
    /* Numerology styles */
    .numerology-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }
    
    @media (max-width: 768px) {
      .numerology-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    
    @media (max-width: 640px) {
      .numerology-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="scroll-smooth">
  <!-- Rest of the content remains unchanged -->
</body>
</html>
